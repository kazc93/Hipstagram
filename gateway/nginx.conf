events {
    worker_connections 1024;
}

http {
    # Upstream para cada microservicio
    # Los nombres deben coincidir exactamente con --name en docker run
    upstream auth_service {
        server hipstagram-auth-service:3001;
    }

    upstream post_service {
        server hipstagram-post-service:3002;
    }

    upstream search_service {
        server hipstagram-search-service:3003;
    }

    upstream admin_service {
        server hipstagram-admin-service:3004;
    }

    server {
        listen 80;

        # Health check del gateway
        location = /api/health {
            return 200 '{"status":"ok","service":"gateway"}';
            add_header Content-Type application/json;
        }

        # Rutas de autenticación → auth-service (puerto 3001)
        location /api/auth {
            proxy_pass http://auth_service;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Request-ID $request_id;
        }

        # Rutas de posts, votos y comentarios → post-service (puerto 3002)
        location /api/posts {
            proxy_pass http://post_service;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Request-ID $request_id;

            # Soporte para subida de imágenes
            client_max_body_size 10m;
        }

        # Rutas de búsqueda → search-service (puerto 3003)
        location /api/busqueda {
            proxy_pass http://search_service;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Request-ID $request_id;
        }

        # Rutas de administración → admin-service (puerto 3004)
        location /api/admin {
            proxy_pass http://admin_service;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Request-ID $request_id;
        }
    }
}

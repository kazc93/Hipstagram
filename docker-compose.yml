services:

  # ── Base de datos ─────────────────────────────────────────────────────────────
  db:
    image: postgres:15-alpine
    container_name: hipstagram-db
    restart: always
    environment:
      POSTGRES_USER:     ${DB_USER}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
      POSTGRES_DB:       ${DB_NAME}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./init.sql:/docker-entrypoint-initdb.d/init.sql

  # ── Microservicio: Auth (puerto 3001) ─────────────────────────────────────────
  auth-service:
    build:
      context: ./backend/services/auth-service
      dockerfile: Dockerfile
    container_name: hipstagram-auth-service
    restart: always
    environment:
      DB_USER:              ${DB_USER}
      DB_HOST:              db
      DB_NAME:              ${DB_NAME}
      DB_PASSWORD:          ${DB_PASSWORD}
      DB_PORT:              ${DB_PORT}
      JWT_SECRET:           ${JWT_SECRET}
      JWT_REFRESH_SECRET:   ${JWT_REFRESH_SECRET}
      CORS_ORIGIN:          ${CORS_ORIGIN}
    depends_on:
      - db

  # ── Microservicio: Posts (puerto 3002) ────────────────────────────────────────
  post-service:
    build:
      context: ./backend/services/post-service
      dockerfile: Dockerfile
    container_name: hipstagram-post-service
    restart: always
    environment:
      DB_USER:      ${DB_USER}
      DB_HOST:      db
      DB_NAME:      ${DB_NAME}
      DB_PASSWORD:  ${DB_PASSWORD}
      DB_PORT:      ${DB_PORT}
      JWT_SECRET:   ${JWT_SECRET}
      AWS_REGION:   ${AWS_REGION}
      S3_BUCKET:    ${S3_BUCKET}
      CORS_ORIGIN:  ${CORS_ORIGIN}
    depends_on:
      - db

  # ── Microservicio: Búsqueda (puerto 3003) ─────────────────────────────────────
  search-service:
    build:
      context: ./backend/services/search-service
      dockerfile: Dockerfile
    container_name: hipstagram-search-service
    restart: always
    environment:
      DB_USER:      ${DB_USER}
      DB_HOST:      db
      DB_NAME:      ${DB_NAME}
      DB_PASSWORD:  ${DB_PASSWORD}
      DB_PORT:      ${DB_PORT}
      JWT_SECRET:   ${JWT_SECRET}
      CORS_ORIGIN:  ${CORS_ORIGIN}
    depends_on:
      - db

  # ── Microservicio: Admin (puerto 3004) ────────────────────────────────────────
  admin-service:
    build:
      context: ./backend/services/admin-service
      dockerfile: Dockerfile
    container_name: hipstagram-admin-service
    restart: always
    environment:
      DB_USER:      ${DB_USER}
      DB_HOST:      db
      DB_NAME:      ${DB_NAME}
      DB_PASSWORD:  ${DB_PASSWORD}
      DB_PORT:      ${DB_PORT}
      JWT_SECRET:   ${JWT_SECRET}
      CORS_ORIGIN:  ${CORS_ORIGIN}
    depends_on:
      - db

  # ── API Gateway nginx (puerto 3000 público) ───────────────────────────────────
  gateway:
    build:
      context: ./gateway
      dockerfile: Dockerfile
    container_name: hipstagram-gateway
    restart: always
    ports:
      - "3000:3000"
    depends_on:
      - auth-service
      - post-service
      - search-service
      - admin-service

  # ── Frontend (solo para desarrollo local — producción usa Amplify) ────────────
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: hipstagram-frontend
    restart: always
    ports:
      - "4200:80"
    depends_on:
      - gateway

volumes:
  postgres_data:
